name: "AI Assistant"

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-assist:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: .github/ai-assist/package-lock.json

      - name: Install AI assistant dependencies
        working-directory: ./.github/ai-assist
        run: npm ci

      - name: Validate external services configuration
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PGVECTOR_CONNECTION_STRING: ${{ secrets.PGVECTOR_CONNECTION_STRING }}
          PGVECTOR_HOST: ${{ vars.PGVECTOR_HOST }}
          PGVECTOR_USER: ${{ secrets.PGVECTOR_USER }}
          PGVECTOR_PASSWORD: ${{ secrets.PGVECTOR_PASSWORD }}
          PGVECTOR_DATABASE: ${{ vars.PGVECTOR_DATABASE }}
        run: |
          missing=0
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::GEMINI_API_KEY is required for AI review."
            missing=1
          fi

          if [ -z "$PGVECTOR_CONNECTION_STRING" ]; then
            for name in PGVECTOR_HOST PGVECTOR_USER PGVECTOR_PASSWORD PGVECTOR_DATABASE; do
              if [ -z "${!name}" ]; then
                echo "::error::$name is required when PGVECTOR_CONNECTION_STRING is not set."
                missing=1
              fi
            done
          fi

          exit $missing

      - name: Extract PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Collect changed source files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.ts
            **/*.tsx
            **/*.js
            **/*.jsx
            **/*.py
            **/*.java
            **/*.cs
            **/*.dart
          files_ignore: |
            **/*.test.ts
            **/*.spec.ts
            **/*.test.tsx
            **/*.spec.tsx
            **/*.test.js
            **/*.spec.js
            **/*_test.py
            **/*Test.java
            **/*Tests.java
            **/*[Tt]est.cs
            **/*[Tt]ests.cs
            **/*_test.dart

      - name: Run AI review and test pipeline
        id: ai-pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_DIFF_PATH: "${{ github.workspace }}/pr_diff.txt"
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
          LLM_MODEL: gemini-2.5-flash
          RAG_TOP_K: "8"
          PGVECTOR_CONNECTION_STRING: ${{ secrets.PGVECTOR_CONNECTION_STRING }}
          PGVECTOR_SSL_CA_CERT: ${{ secrets.PGVECTOR_SSL_CA_CERT }}
          PGVECTOR_HOST: ${{ vars.PGVECTOR_HOST }}
          PGVECTOR_PORT: ${{ vars.PGVECTOR_PORT }}
          PGVECTOR_USER: ${{ secrets.PGVECTOR_USER }}
          PGVECTOR_PASSWORD: ${{ secrets.PGVECTOR_PASSWORD }}
          PGVECTOR_DATABASE: ${{ vars.PGVECTOR_DATABASE }}
          PGVECTOR_TABLE_NAME: ${{ vars.PGVECTOR_TABLE_NAME }}
          PGVECTOR_COLLECTION_TABLE_NAME: ${{ vars.PGVECTOR_COLLECTION_TABLE_NAME }}
          PGVECTOR_COLLECTION_NAME: ${{ vars.PGVECTOR_COLLECTION_NAME }}
          PGVECTOR_ENABLE_HNSW: ${{ vars.PGVECTOR_ENABLE_HNSW }}
          PGVECTOR_MAX_INDEXED_CHUNKS: ${{ vars.PGVECTOR_MAX_INDEXED_CHUNKS }}
          PGVECTOR_SSL_ENABLED: ${{ vars.PGVECTOR_SSL_ENABLED }}
          PGVECTOR_SSL_REJECT_UNAUTHORIZED: ${{ vars.PGVECTOR_SSL_REJECT_UNAUTHORIZED }}
          PGVECTOR_REBUILD_INDEX: "false"
        working-directory: ./.github/ai-assist
        run: npx ts-node --project tsconfig.json src/pipeline/index.ts

      - name: Post AI code review comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reviewPath = `${process.env.GITHUB_WORKSPACE}/review_result.txt`;

            if (!fs.existsSync(reviewPath)) {
              core.info('review_result.txt was not generated.');
              return;
            }

            const reviewContent = fs.readFileSync(reviewPath, 'utf8').trim();
            if (!reviewContent) {
              core.info('AI review result is empty.');
              return;
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reviewContent,
            });
